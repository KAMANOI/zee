# Zee asset profiles example
# Copy to ./assets.toml and edit. Zee starts in dry_run by default.
# Promote response_mode to "auto" only after confirming zero false positives.
#
# decoy_paths NOTE — the paths below intentionally live under a Zee-only
# directory (~/Documents/zee-decoys/), NOT inside real tool directories
# such as ~/.aws/ or ~/.ssh/. Real tools (AWS CLI, ssh-agent, IDEs) walk
# their own dot-directories and will produce false positives if decoys
# share those paths. Keeping decoys in a dedicated directory you also
# exclude from backup / AV / indexer scans (see README "decoy placement")
# is the configuration that the v0.1 trigger-limited responder is
# designed for.

dry_run = true

[[assets]]
id = "front-desk-pc"
type = "workstation"
overnight_active = false
decoy_paths = [
    "~/Documents/zee-decoys/aws-credentials.decoy",
    "~/Documents/zee-decoys/.env",
]
response_mode = "notify"   # auto / staged / notify  (start with notify)
cut_method = "full"        # full / egress  (only used when mode != notify)

[[assets]]
id = "edit-laptop"
type = "workstation"
overnight_active = true
decoy_paths = [
    "~/Documents/zee-decoys/id_rsa.decoy",
]
response_mode = "notify"
cut_method = "egress"


# ----------------------------------------------------------------------
# About false positives — read this before promoting any asset to auto.
#
# Zee's current watcher backends (Linux inotify, macOS kqueue, Windows
# ReadDirectoryChangesW) do NOT report which process touched the
# decoy. Therefore Zee cannot consult an allowlist of legitimate
# processes at detect time. There is no [allowlist] section in this
# file by design — a setting that the responder would never consult
# would create a false sense of safety.
#
# False positives are controlled in two other ways instead:
#
#   1. PLACEMENT: keep decoys outside what your backup tool, AV/EDR,
#      and OS file indexer walk by default. The Zee-only directory
#      shown above is the recommended pattern; also add that directory
#      to your Spotlight privacy / Time Machine / Windows search index
#      / backup tool / AV exclusion lists. Real tool dot-directories
#      (~/.aws/, ~/.ssh/, ~/.config/) are NOT recommended for decoy
#      placement because their owners walk them as part of normal work.
#
#   2. TRIGGER LIMIT: auto-cut fires only on change-class touches
#      (write / delete / rename / extend). Read-class touches notify
#      only and require manual `zee cut <asset_id>` if hostile.
#      Legitimate bulk readers (backup, AV, indexer) read decoys; they
#      do not write to them under normal operation.
#
# Note: the security boundary against intruders is NOT process-name
# matching (which can be spoofed). It is the placement guidance plus
# the change-class trigger limit, plus the operator's manual review
# of read-class alerts.
# ----------------------------------------------------------------------
#
# Canary URL (optional) — macOS / Windows read detection
#
# kqueue (macOS) and ReadDirectoryChangesW (Windows) do NOT emit read
# notifications. To observe "the attacker only read the decoy" on those
# OSes, set the ZEE_CANARY_BASE_URL environment variable to an external
# receiver you control (e.g. Canarytokens.org, a self-hosted webhook,
# AWS Lambda, Cloudflare Worker). When set, the seeder embeds a canary
# URL into env / credentials / notes templates; when an attacker
# dereferences the URL, the external receiver fires (out-of-band; the
# hit never re-enters Zee's local responder).
#
#   export ZEE_CANARY_BASE_URL="https://your-receiver.example.com/r"
#
# Linux observes reads directly via inotify and does not need a canary.
# When ZEE_CANARY_BASE_URL is unset, no canary URL is embedded and the
# read path on macOS / Windows is not observed (safe by default).
# ----------------------------------------------------------------------
